name: Mark stale issues and pull requests

on:
  schedule:
    - cron: '29 19 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 45
          days-before-close: 14
          stale-issue-label: no-issue-activity
          stale-pr-label: no-pr-activity
          exempt-issue-labels: pinned,security,good first issue,help wanted
          exempt-pr-labels: pinned,security,work in progress
          stale-issue-message: |
            This issue has been quiet for a while, so it is marked stale to keep the tracker useful.
            If it is still relevant, please add a short comment with the current status or next step.
          stale-pr-message: |
            This pull request has been quiet for a while, so it is marked stale to keep review queues clear.
            If it is still active, please rebase if needed and add a short status comment.
          close-issue-message: |
            Closing due to inactivity. Reopen or file a fresh issue if this still matters.
          close-pr-message: |
            Closing due to inactivity. A fresh pull request is welcome when the change is ready.
