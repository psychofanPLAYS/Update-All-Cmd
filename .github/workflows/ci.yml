name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Bash smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check Bash syntax
        run: |
          bash -n bin/update-all
          bash -n install.sh

      - name: Run output-format smoke test
        run: bash tests/test-output-format.sh

      - name: Check dry-run command
        run: ./bin/update-all --dry-run --no-anim --no-color

      - name: Install cspell
        run: npm install -g cspell@10

      - name: Run spellcheck
        run: cspell README.md bin/update-all install.sh docs/UPDATE_ALL_HANDOFF.md cspell.json
