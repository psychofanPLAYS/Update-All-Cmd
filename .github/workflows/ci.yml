name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Bash quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check Bash syntax
        run: |
          bash -n bin/update-all
          bash -n install.sh

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: shellcheck bin/update-all install.sh tests/test-output-format.sh

      - name: Run output-format smoke test
        run: bash tests/test-output-format.sh

      - name: Check dry-run command
        run: ./bin/update-all --dry-run --no-anim --no-color

      - name: Install cspell
        run: npm install -g cspell@10

      - name: Run spellcheck
        run: cspell README.md bin/update-all install.sh docs/UPDATE_ALL_HANDOFF.md cspell.json tests/test-output-format.sh CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md .github/*.md .github/*.yml .github/**/*.md .github/**/*.yml

      - name: Public safety scan
        run: |
          matches="$(grep -RInE '/home/[A-Za-z0-9._-]+|/Users/[A-Za-z0-9._-]+|192\.168\.|100\.[0-9]+\.|BEGIN [A-Z ]*PRIVATE KEY|sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}' \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            . || true)"
          matches="$(printf '%s\n' "$matches" | grep -v '/home/linuxbrew' || true)"
          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            exit 1
          fi
